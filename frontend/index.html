<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Doc Ease</title>

    <!-- ✅ Preconnect to Google Fonts (VERY IMPORTANT) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ✅ Non-blocking font loading -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    >

    <!-- ✅ Fallback if JS disabled -->
    <noscript>
      <link 
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet"
      >
    </noscript>

    <!-- ✅ Preload main JS (reduces render blocking) -->
    <link rel="modulepreload" href="/src/main.jsx">

  </head>

  <body>
    <div id="root"></div>

    <!-- ✅ Keep module script (Vite optimized) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
