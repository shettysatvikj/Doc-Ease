<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Primary SEO -->
    <title>Doc Ease | Private Healthcare Clinic</title>
    <meta
      name="description"
      content="Doc Ease is a private healthcare clinic offering advanced medical specialists, discreet consultations, and personalized patient care."
    />

    <!-- ✅ Theme color (improves mobile audit slightly) -->
    <meta name="theme-color" content="#06353b" />

    <!-- ✅ Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ✅ Optimized Google Fonts (display swap prevents render blocking delay) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Open Graph (boosts SEO score) -->
    <meta property="og:title" content="Doc Ease | Private Healthcare Clinic" />
    <meta
      property="og:description"
      content="Advanced medical specialists delivering private and personalized healthcare services."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />

  </head>

  <body>
    <div id="root"></div>

    <!-- ✅ Your Vite entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
