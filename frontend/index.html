<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (VERY IMPORTANT) -->
    <title>Best Clinic in Mumbai | Dr Ease - Book Doctor Appointment</title>

    <!-- Meta Description -->
    <meta name="description" content="Dr Ease is a trusted clinic in Mumbai offering expert doctors, fast appointment booking, and quality healthcare services. Book your appointment today." />

    <!-- SEO Meta -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Open Graph (Social SEO) -->
    <meta property="og:title" content="Dr Ease Clinic Mumbai" />
    <meta property="og:description" content="Book appointments with top doctors in Mumbai at Dr Ease." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dr Ease Clinic Mumbai" />
    <meta name="twitter:description" content="Book doctor appointments online with Dr Ease." />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Fonts (optimized) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link 
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    >

    <noscript>
      <link 
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet"
      >
    </noscript>

    <!-- Structured Data (BIG SEO BOOST) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalClinic",
      "name": "Dr Ease",
      "url": "https://yourdomain.com",
      "logo": "https://yourdomain.com/logo.png",
      "image": "https://yourdomain.com/clinic.jpg",
      "description": "Dr Ease is a clinic in Mumbai offering online doctor appointments and healthcare services.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Mumbai",
        "addressCountry": "IN"
      },
      "telephone": "+91XXXXXXXXXX"
    }
    </script>

  </head>

  <body>
    <div id="root"></div>

    <!-- Important for SEO fallback -->
    <noscript>
      <h1>Dr Ease - Clinic in Mumbai</h1>
      <p>Book doctor appointments online with trusted healthcare professionals.</p>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
